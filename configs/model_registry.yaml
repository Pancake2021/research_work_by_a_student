    params: 4.0B
    license: apache-2.0
    context_length: 262144
    load_in_4bit: true
    trust_remote_code: false
    task: text-generation
    priority: 1
    notes: >
      First candidate for UEBA bake-off. Fresh Qwen3 small model with strong
      instruction following and reasoning; not guaranteed to fit GRPO on 8GB.

  qwen2_5_3b_instruct:
    role: practical_baseline
    hf_id: Qwen/Qwen2.5-3B-Instruct
