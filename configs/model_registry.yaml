      Strong 3.8B baseline. Requires trust_remote_code; compatibility with
      Unsloth/TRL must be verified before SFT/GRPO.

  gemma4_e4b:
    role: optional
    hf_id: google/gemma-4-E4B-it
    params: 4.5B_effective
    license: apache-2.0
    context_length: 128000
    load_in_4bit: true
    trust_remote_code: false
