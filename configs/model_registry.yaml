    license: apache-2.0
    context_length: 32768
    load_in_4bit: true
    trust_remote_code: false
    task: text-generation
    priority: 3
    notes: >
      Lightweight fallback for GRPO on RTX 4060 8GB when 3B-4B models do not
      fit with generation groups.

  smollm3_3b:
    role: alternative_open
    hf_id: HuggingFaceTB/SmolLM3-3B
    params: 3B
    license: apache-2.0
    context_length: 65536
    load_in_4bit: true
    trust_remote_code: false
    task: text-generation
    priority: 4
    chat_template_kwargs:
      enable_thinking: false
    notes: >
      Fully open research-friendly 3B baseline with open training details.

  phi4_mini_instruct:
